<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Identificar Logos</title>
    <style>
        body { background: #1a1512; color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .item { border: 1px solid #333; padding: 10px; text-align: center; background: #241c18; }
        img { max-width: 100%; max-height: 120px; object-fit: contain; background: #0b0704; border: 1px solid #444; margin-bottom: 10px; }
    </style>
</head>
<body>
